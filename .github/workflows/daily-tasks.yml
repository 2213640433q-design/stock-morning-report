name: Stock Morning Report & Learning

on:
  schedule:
    # 北京时间 10:30 = UTC 2:30
    - cron: '30 2 * * 1-5'
  workflow_dispatch:

jobs:
  value-learning:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - run: pip install requests
    
    - name: Send value learning
      env:
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: python3 value_investment_learning.py
