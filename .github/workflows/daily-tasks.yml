name: Daily Tasks

on:
  schedule:
    # 北京时间 10:00 = UTC 2:00
    # 北京时间 10:30 = UTC 2:30
    - cron: '0 2 * * 1-5'  # 股票行情 10:00
    - cron: '30 2 * * 1-5' # 价值投资学习 10:30
  workflow_dispatch:

jobs:
  stock-report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install requests
    - name: Send stock report
      env:
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: python3 stock_report.py

  value-learning:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install requests
    - name: Send value learning
      env:
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: python3 value_investment_learning.py
